<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quattro — browser demo</title>
  <style>
    body { margin: 0; background: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
    #canvas { border: 0; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    .note { color: #888; font-size: 12px; margin-top: 0.5rem; max-width: 420px; text-align: center; }
    #status { color: #888; font: 14px monospace; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <p id="status">Loading…</p>
  <p class="note">Click the canvas to focus. Keyboard: 0–9 level, RETURN start; A/D left/right, Z/X rotate, SPACE soft drop.</p>
  <p class="note">Experimental browser demo (VICE.js). Native build: <code>make c64</code>.</p>

  <script>
    (function () {
      var canvas = document.getElementById('canvas');
      var statusEl = document.getElementById('status');

      function audioDetected() {
        return (typeof AudioContext !== 'undefined') || (typeof webkitAudioContext !== 'undefined');
      }

      var viceArgs = ['-autostart', 'quattro.prg'].concat(
        audioDetected() ? ['-soundsync', '0', '-soundrate', '22050', '-soundfragsize', '2'] : ['+sound']
      );

      function runVice(prgBytes) {
        statusEl.textContent = 'Starting emulator…';
        window.Module = {
          preRun: [function () {
            FS.createDataFile('/', 'quattro.prg', prgBytes, true, true);
          }],
          arguments: viceArgs,
          canvas: canvas
        };
        var s = document.createElement('script');
        s.src = 'vendor/x64.js';
        s.onerror = function () {
          statusEl.textContent = 'Error: vendor/x64.js not found.';
        };
        document.body.appendChild(s);
      }

      fetch('quattro.prg')
        .then(function (r) {
          if (!r.ok) throw new Error(r.statusText);
          return r.arrayBuffer();
        })
        .then(function (buf) { runVice(new Uint8Array(buf)); })
        .catch(function (e) {
          statusEl.textContent = 'Error: could not load game.';
        });
    })();
  </script>
</body>
</html>
