<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quattro — browser demo</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #000; }
    #canvas { display: block; width: 100%; height: 100%; border: 0; object-fit: contain; image-rendering: pixelated; image-rendering: crisp-edges; }
    #overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    #overlay span { color: #888; font: bold 1.3em system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="overlay"><span>CLICK TO START</span></div>
  <canvas id="canvas"></canvas>

  <script>
    (function () {
      var overlay = document.getElementById('overlay');
      var canvas = document.getElementById('canvas');

      function audioDetected() {
        return (typeof AudioContext !== 'undefined') || (typeof webkitAudioContext !== 'undefined');
      }

      function start() {
        overlay.remove();
        var viceArgs = ['-autostart', 'quattro.prg'].concat(
          audioDetected() ? ['-soundsync', '0', '-soundrate', '22050', '-soundfragsize', '2'] : ['+sound']
        );
        fetch('quattro.prg')
          .then(function (r) {
            if (!r.ok) throw new Error(r.statusText);
            return r.arrayBuffer();
          })
          .then(function (r) {
            var prgBytes = new Uint8Array(r);
            window.Module = {
              preRun: [function () {
                FS.createDataFile('/', 'quattro.prg', prgBytes, true, true);
              }],
              arguments: viceArgs,
              canvas: canvas
            };
            var s = document.createElement('script');
            s.src = 'vendor/x64.js';
            s.onerror = function () { console.error('vendor/x64.js not found'); };
            document.body.appendChild(s);
          })
          .catch(function (e) { console.error('Could not load game:', e); });
      }

      overlay.addEventListener('click', start, { once: true });
    })();
  </script>
</body>
</html>
